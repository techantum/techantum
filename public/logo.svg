<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Left section - Blue -->
  <rect x="0" y="0" width="100" height="200" fill="#2563eb" rx="20"/>
  
  <!-- Right section - Green -->
  <rect x="100" y="0" width="100" height="200" fill="#22c55e" rx="20"/>
  
  <!-- White design inside green section - Abstract facility/building icon -->
  <g transform="translate(150, 100)">
    <!-- Building structure -->
    <rect x="-30" y="-40" width="20" height="60" fill="white" rx="2"/>
    <rect x="-5" y="-50" width="20" height="70" fill="white" rx="2"/>
    <rect x="20" y="-35" width="20" height="55" fill="white" rx="2"/>
    
    <!-- Windows -->
    <rect x="-26" y="-30" width="4" height="4" fill="#22c55e"/>
    <rect x="-26" y="-20" width="4" height="4" fill="#22c55e"/>
    <rect x="-26" y="-10" width="4" height="4" fill="#22c55e"/>
    <rect x="-18" y="-30" width="4" height="4" fill="#22c55e"/>
    <rect x="-18" y="-20" width="4" height="4" fill="#22c55e"/>
    <rect x="-18" y="-10" width="4" height="4" fill="#22c55e"/>
    
    <rect x="-1" y="-40" width="4" height="4" fill="#22c55e"/>
    <rect x="-1" y="-30" width="4" height="4" fill="#22c55e"/>
    <rect x="-1" y="-20" width="4" height="4" fill="#22c55e"/>
    <rect x="-1" y="-10" width="4" height="4" fill="#22c55e"/>
    <rect x="7" y="-40" width="4" height="4" fill="#22c55e"/>
    <rect x="7" y="-30" width="4" height="4" fill="#22c55e"/>
    <rect x="7" y="-20" width="4" height="4" fill="#22c55e"/>
    <rect x="7" y="-10" width="4" height="4" fill="#22c55e"/>
    
    <rect x="24" y="-25" width="4" height="4" fill="#22c55e"/>
    <rect x="24" y="-15" width="4" height="4" fill="#22c55e"/>
    <rect x="24" y="-5" width="4" height="4" fill="#22c55e"/>
    <rect x="32" y="-25" width="4" height="4" fill="#22c55e"/>
    <rect x="32" y="-15" width="4" height="4" fill="#22c55e"/>
    <rect x="32" y="-5" width="4" height="4" fill="#22c55e"/>
  </g>
  
  <!-- White text/letters in blue section - HFG -->
  <text x="50" y="110" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">HFG</text>
</svg>